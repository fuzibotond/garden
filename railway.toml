# Railway config for the Garden API service.
# In the Railway dashboard: Settings → Source → Root Directory = / (leave blank)

[build]
  dockerfilePath = "src/Garden/Garden.Api/Dockerfile"

[deploy]
  healthcheckPath = "/health/live"
  healthcheckTimeout = 300
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5
