name: Deploy Railway (Main)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'apps/web/**'
      - 'railway.toml'
      - 'apps/web/railway.toml'
      - '.github/workflows/deploy-railway-main.yml'
  workflow_dispatch:

concurrency:
  group: railway-main-deploy
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Deploy API to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_API_SERVICE_ID: ${{ secrets.RAILWAY_API_SERVICE_ID }}
        run: railway up --ci --detach --service=${RAILWAY_API_SERVICE_ID} --environment=${RAILWAY_ENVIRONMENT_ID} --project=${RAILWAY_PROJECT_ID}

  deploy-web:
    name: Deploy Web to Railway
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Web service
        working-directory: apps/web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_WEB_SERVICE_ID: ${{ secrets.RAILWAY_WEB_SERVICE_ID }}
        run: railway up --ci --detach --service=${RAILWAY_WEB_SERVICE_ID} --environment=${RAILWAY_ENVIRONMENT_ID} --project=${RAILWAY_PROJECT_ID}
