name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Garden/Garden.slnx

      - name: Build
        run: dotnet build src/Garden/Garden.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Garden/Garden.slnx --configuration Release --no-build --logger trx

      - name: Publish API
        run: dotnet publish src/Garden/Garden.Api/Garden.Api.csproj -c Release -o publish

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: garden-api
          path: publish

      - name: Build Docker image
        run: docker build -f src/Garden/Garden.Api/Dockerfile -t garden-api:ci .