name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Garden/Garden.slnx

      - name: Build
        run: dotnet build src/Garden/Garden.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Garden/Garden.slnx --configuration Release --no-build

      - name: Build Docker image
        run: docker build -f src/Garden/Garden.Api/Dockerfile -t garden-api:ci .