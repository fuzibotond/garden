name: Deploy QA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: qa-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Windows, X64]
    environment: qa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build QA Docker image
        run: docker build -f src/Garden/Garden.Api/Dockerfile -t garden-api:qa .
        shell: cmd

      - name: Create or update QA secret
        run: >
          kubectl -n garden-qa create secret generic garden-secrets ^
          --from-literal=Jwt__Key="${{ secrets.QA_JWT_KEY }}" ^
          --from-literal=MSSQL_SA_PASSWORD="${{ secrets.QA_SQL_PASSWORD }}" ^
          --from-literal=ConnectionStrings__GardenDb="Server=garden-sqlserver,1433;Database=GardenDb;User Id=sa;Password=${{ secrets.QA_SQL_PASSWORD }};TrustServerCertificate=True;" ^
          --dry-run=client -o yaml | kubectl apply -f -
        shell: cmd

      - name: Apply QA manifests
        run: kubectl apply -k deploy/k8s/overlays/qa
        shell: cmd

      - name: Update image in QA deployment
        run: kubectl set image deployment/garden-api garden-api=garden-api:qa -n garden-qa
        shell: cmd

      - name: Restart API deployment
        run: kubectl rollout restart deployment/garden-api -n garden-qa
        shell: cmd

      - name: Wait for rollout
        run: kubectl rollout status deployment/garden-api -n garden-qa --timeout=120s
        shell: cmd